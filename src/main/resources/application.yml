spring:
  config:
    import: optional:classpath:application-local.yml
  application:
    name: payment-backend
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/nudgebank}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        format_sql: true

server:
  port: 9090

app:
  cors:
    allowed-origin-patterns:
      - ${ALLOW_URL1:https://*.ngrok-free.dev}

bank:
  server:
    url: http://localhost:9999