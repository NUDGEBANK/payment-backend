services:
  payment-backend:
    build: .
    #image: xodnjs1/nudge-payment-backend:latest
    container_name: nudge-payment-backend
    restart: unless-stopped
    environment:
      DB_URL: jdbc:postgresql://${DB_HOST}:5432/${DB_NAME}
      DB_USERNAME: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      ALLOW_URL1: ${ALLOW_URL}
      TZ: Asia/Seoul
    networks:
      - nudge-net

  payment-frontend:
    build:
      context: ../payment-frontend
      dockerfile: Dockerfile
    container_name: nudge-payment-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - payment-backend
    networks:
      - nudge-net

networks:
  nudge-net:

